events {}

http {

    # ---- Le backend Spring Boot (tourne sur la machine hôte, port 8080) ----
    upstream backend {
        # host.docker.internal = la machine hôte vue depuis le conteneur Docker
        server host.docker.internal:8080;
    }

    server {
        listen 80;

        # ---- Endpoint interne utilisé par auth_request ----
        location = /_auth_check {
            internal;
            # Si pas de token, renvoyer 401 directement
            if ($http_x_auth_token = "") {
                return 401;
            }
            proxy_pass              http://backend/auth/validate/$http_x_auth_token;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        X-Original-URI $request_uri;
        }

        # ---- Routes publiques (pas besoin de token) ----
        # Login, register, logout sont accessibles sans authentification
        location /auth/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- Routes protégées : /products ----
        # Avant de forward, Nginx vérifie le token via /_auth_check
        location /products {
            auth_request /_auth_check;
            error_page 401 = @unauthorized;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- Routes protégées : /admin ----
        location /admin {
            auth_request /_auth_check;
            error_page 401 = @unauthorized;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location @unauthorized {
            return 401 '{"error":"Unauthorized - provide X-Auth-Token header"}';
            default_type application/json;
        }
    }
}
